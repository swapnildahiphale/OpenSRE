version: '3.8'

# ═══════════════════════════════════════════════════════════════════════════════
# OpenSRE — Local Development Stack
# ═══════════════════════════════════════════════════════════════════════════════
#
# Services:
#   postgres, config-service, sre-agent, web-ui, slack-bot
#
# Note: slack-bot requires SLACK_BOT_TOKEN and SLACK_APP_TOKEN in .env
#       If not configured, it will exit gracefully with a warning message
#
# Usage:
#   make dev        Start all services
#   make stop       Stop everything
#   make logs       Follow logs
#   make clean      Remove containers + volumes
#
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # PostgreSQL — backend for config-service
  # ─────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: opensre-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: opensre
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: opensre
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opensre -d opensre"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  # ─────────────────────────────────────────────────────────────────────────────
  # Config Service — team config, tokens, audit logging
  # ─────────────────────────────────────────────────────────────────────────────
  config-service:
    build:
      context: ./config_service
      dockerfile: Dockerfile
    container_name: opensre-config-service
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/app/scripts/entrypoint-local.sh"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://opensre:localdev@postgres:5432/opensre?sslmode=disable
      TOKEN_PEPPER: ${TOKEN_PEPPER:-localdev-pepper-must-be-32-chars-minimum!!}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-local-admin-token}
      ADMIN_AUTH_MODE: token
      TEAM_AUTH_MODE: token
      IMPERSONATION_JWT_SECRET: local-dev-impersonation-secret-32chars!!
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: console
      ENV_FILE_PATH: /repo/.env  # Path to .env file for write-back
    ports:
      - "8081:8080"
    volumes:
      # Mount config directory for YAML config in local mode
      - ./config_service/config:/app/config:rw
      # Mount repo root for .env write-back in local mode
      # (Mounting entire repo allows atomic file operations)
      - .:/repo:rw
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network
      - default  # Needs host access for port publishing

  # ─────────────────────────────────────────────────────────────────────────────
  # Neo4j — Knowledge graph for service topology
  # ─────────────────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: opensre-neo4j
    restart: unless-stopped
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      NEO4J_AUTH: neo4j/localdev
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app_network

  # ─────────────────────────────────────────────────────────────────────────────
  # LiteLLM Proxy — translates Anthropic API to OpenRouter (replaces credential-proxy)
  # ─────────────────────────────────────────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: opensre-litellm
    restart: unless-stopped
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "4001:4000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/readiness')"]
      interval: 10s
      timeout: 15s
      retries: 10
      start_period: 30s
    networks:
      - app_network
      - default

  # ─────────────────────────────────────────────────────────────────────────────
  # SRE Agent — runs investigations (in-process, no K8s sandboxes)
  # ─────────────────────────────────────────────────────────────────────────────
  sre-agent:
    build:
      context: ./sre-agent
      dockerfile: Dockerfile
    container_name: opensre-sre-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Config service integration
      - CONFIG_SERVICE_URL=http://config-service:8080
      # Tenant context for config loading
      - OPENSRE_TENANT_ID=local
      - OPENSRE_TEAM_ID=default
      # LLM access via LiteLLM proxy (OpenAI-compatible endpoint for LangGraph)
      - LITELLM_BASE_URL=http://litellm:4000/v1
      - LITELLM_API_KEY=${OPENROUTER_API_KEY:-sk-placeholder}
      # Legacy vars (kept for memory system LLM calls)
      - ANTHROPIC_API_KEY=placeholder-routed-via-litellm
      - ANTHROPIC_BASE_URL=http://litellm:4000
      # Neo4j knowledge graph
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=localdev
      # Coralogix config
      - CORALOGIX_DOMAIN=${CORALOGIX_DOMAIN:-}
      # Skills filtering
      - ENABLED_SKILLS=${ENABLED_SKILLS:-all}
      # Investigation timeout (seconds)
      - AGENT_TIMEOUT_SECONDS=900
      # Memory LLM model (must match a model the LLM proxy can route)
      - MEMORY_LLM_MODEL=arcee-ai/trinity-large-preview:free
      # Other services
      - LMNR_PROJECT_API_KEY=${LMNR_PROJECT_API_KEY:-}
    depends_on:
      config-service:
        condition: service_healthy
      litellm:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Note: Cannot use read_only:true because Claude Code CLI needs to write
    # But we limit writable locations with tmpfs
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=500m
      - /home/agent/.cache:rw,noexec,nosuid,size=200m
      - /home/agent/.claude:rw,nosuid,size=500m,uid=1000,gid=1000
    mem_limit: 2g
    cpus: 2
    pids_limit: 100
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "8001:8000"
    networks:
      - app_network
      - default  # Needs external access for API calls
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─────────────────────────────────────────────────────────────────────────────
  # Web UI — admin console + agent entry point (Next.js)
  # ─────────────────────────────────────────────────────────────────────────────
  web-ui:
    build:
      context: ./web_ui
      dockerfile: Dockerfile
    container_name: opensre-web-ui
    restart: unless-stopped
    environment:
      - CONFIG_SERVICE_URL=http://config-service:8080
      - AGENT_SERVICE_URL=http://sre-agent:8000
      - WEB_UI_COOKIE_SECURE=0
      - HOSTNAME=0.0.0.0
      - PORT=3000
    ports:
      - "3002:3000"
    depends_on:
      config-service:
        condition: service_healthy
    mem_limit: 512m
    cpus: 1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app_network
      - default

  # ─────────────────────────────────────────────────────────────────────────────
  # Slack Bot — connects Slack to SRE Agent
  # Will exit gracefully if SLACK_BOT_TOKEN and SLACK_APP_TOKEN are not configured
  # ─────────────────────────────────────────────────────────────────────────────
  slack-bot:
    build:
      context: ./slack-bot
      dockerfile: Dockerfile
    container_name: opensre-slack-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SRE_AGENT_URL=http://sre-agent:8000
      - CONFIG_SERVICE_URL=http://config-service:8080
      - CONFIG_MODE=${CONFIG_MODE:-}
    depends_on:
      - sre-agent
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Cannot use read_only because app may write logs/temp files
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=100m
    volumes:
      # Mount assets read-only
      - ./slack-bot/assets:/app/assets:ro
    mem_limit: 1g
    cpus: 1
    pids_limit: 50
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app_network
      - default  # Needs external access to connect to Slack

networks:
  app_network:
    driver: bridge
    internal: true  # Internal network for inter-service communication
  default:
    driver: bridge  # Default network with external access

volumes:
  postgres-data:
    name: opensre-postgres-data
  neo4j-data:
    name: opensre-neo4j-data
